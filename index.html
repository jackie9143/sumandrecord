<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ JACKIE的思维火花记录 // 今天又在想什么呢?</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --accent-glow: #00ffaa;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 12px;
            display: flex;
            justify-content: center;
        }
        .container { width: 100%; max-width: 720px; }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        h2 { 
            color: var(--accent-glow); 
            font-size: 18px; 
            margin-bottom: 12px; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cyber-logo {
            font-size: 26px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s ease, filter 0.2s ease;
            display: inline-block;
        }
        .cyber-logo:hover {
            transform: scale(1.2);
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }
        #configCard {
            display: none;
            border: 1px dashed var(--accent-glow);
            background: rgba(22, 27, 34, 0.95);
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h3 { color: var(--accent-glow); font-size: 14px; margin-bottom: 10px; }
        textarea, input, select {
            width: 100%;
            background: rgba(9, 12, 16, 0.8);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 10px;
            outline: none;
        }
        textarea:focus, input:focus, select:focus { border-color: var(--accent-glow); }
        .btn-group { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        button {
            flex: 1;
            min-width: 120px;
            background: #238636;
            color: #fff;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: 0.2s;
        }
        button:hover { background: #2ea043; }
        button.secondary { background: #21262d; border: 1px solid var(--border-color); color: var(--text-main); }
        button.secondary:hover { background: #30363d; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border-color); }
        .img-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .history-item {
            background: rgba(9, 12, 16, 0.5);
            border: 1px solid #21262d;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .refine-box {
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px dashed var(--border-color);
            padding-top: 10px;
            margin-top: 10px;
        }
        @media (max-width: 480px) {
            body { padding: 8px; }
            .card { padding: 12px; }
            button { width: 100%; min-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>
        <span class="cyber-logo" onclick="toggleConfigBackdoor()" title="芝麻开门">⚡</span> 
        JACKIE的思维火花记录
        <span style="font-size: 11px; color: var(--text-muted); font-weight: normal;">// 今天又在想什么呢？</span>
    </h2>

    <!-- 🚪 暗门配置区域 -->
    <div class="card" id="configCard">
        <h3>🔒 配置面板</h3>
        <label style="font-size: 11px; color: var(--text-muted);">DEEPSEEK API KEY</label>
        <input type="password" id="apiKey" placeholder="sk-xxx">
        
        <label style="font-size: 11px; color: var(--text-muted);">NOTION API KEY</label>
        <input type="password" id="notionSecret" placeholder="secret_xxxxxxxx...">
        
        <label style="font-size: 11px; color: var(--text-muted);">NOTION DATABASE ID</label>
        <input type="text" id="notionDbId" placeholder="例如：a1b2c3d4e5f67890123456789abcdef0">

        <button onclick="saveConfig()">💾 保存并隐藏</button>
    </div>

    <!-- 1. 多模态采集卡片 -->
    <div class="card">
        <h3>1. 采集内容</h3>
        <textarea id="rawText" rows="4" placeholder="在此输入文字、点击下方录音，或直接在页面 Cmd+V 粘贴截图..."></textarea>
        
        <div class="btn-group">
            <button class="secondary" id="recordBtn" onclick="toggleRecording()">🎙️ 按下录音</button>
            <button class="secondary" onclick="document.getElementById('fileInput').click()">📷 上传图片</button>
            <input type="file" id="fileInput" multiple accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
        </div>

        <div id="imgPreviewArea" class="img-container"></div>

        <button onclick="processWithDeepSeek()">🔮 分析总结</button>
    </div>

    <!-- 2. AI 提炼与微调确认卡片 -->
    <div class="card" id="confirmCard" style="display: none;">
        <h3>2. 确认与微调</h3>
        
        <label style="font-size: 11px; color: var(--text-muted);">碎片标题：</label>
        <input type="text" id="outTitle">
        
        <label style="font-size: 11px; color: var(--text-muted);">分类：</label>
        <select id="outCategory">
            <option value="工作学习">💼 工作学习</option>
            <option value="思维火花">💡 思维火花</option>
            <option value="兴趣爱好">🎸 兴趣爱好</option>
            <option value="工具技巧">🛠️ 工具技巧</option>
            <option value="个人代办">📅 个人代办</option>
            <option value="其它">📦 其它</option>
        </select>

        <label style="font-size: 11px; color: var(--text-muted);">碎片内容（摘要）：</label>
        <textarea id="outSummary" rows="4"></textarea>

        <div class="refine-box">
            <label style="font-size: 11px; color: var(--accent-glow);">💬 修改要求 </label>
            <input type="text" id="refinePrompt" placeholder="例如：字数太长了压缩下 / 改成工具技巧分类 / 重点突出时间">
            <button class="secondary" onclick="processWithDeepSeek(true)" style="margin-bottom: 12px;">🔄 重新输出</button>
        </div>

        <button id="syncBtn" onclick="syncToNotion()" style="background: #0052d9; font-size: 15px;">🚀 确认并写入 Notion</button>
    </div>

    <!-- 3. 最近 10 条历史缓存 -->
    <div class="card" id="historyCard" style="display: none;">
        <h3>🕒 最近 10 条火花记录</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
    let isRecording = false;
    let recognition = null;
    let imageFiles = [];

    window.addEventListener('DOMContentLoaded', () => {
        renderHistory();
        const apiKey = localStorage.getItem('bt_api_key');
        const notionSecret = localStorage.getItem('notion_secret_key');
        const notionDbId = localStorage.getItem('notion_db_id');
        
        if (apiKey) document.getElementById('apiKey').value = apiKey;
        if (notionSecret) document.getElementById('notionSecret').value = notionSecret;
        if (notionDbId) document.getElementById('notionDbId').value = notionDbId;
    });

    function toggleConfigBackdoor() {
        const configCard = document.getElementById('configCard');
        if (configCard) configCard.style.display = (configCard.style.display === 'block') ? 'none' : 'block';
    }

    function saveConfig() {
        const key = document.getElementById('apiKey').value.trim();
        const secret = document.getElementById('notionSecret').value.trim();
        let dbId = document.getElementById('notionDbId').value.trim();

        // 自动容错：移除开头多余的斜杠 /
        dbId = dbId.replace(/^\//, '').trim();

        if (!key || !secret || !dbId) return alert('请填入完整的 DeepSeek Key、Notion Secret 和 Database ID！');

        localStorage.setItem('bt_api_key', key);
        localStorage.setItem('notion_secret_key', secret);
        localStorage.setItem('notion_db_id', dbId);

        document.getElementById('configCard').style.display = 'none';
        alert('配置保存成功');
    }

    // 🎤 语音功能
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.lang = 'zh-CN';

        recognition.onresult = (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) transcript += event.results[i][0].transcript;
            }
            const rawText = document.getElementById('rawText');
            if (rawText) rawText.value += (rawText.value ? '\n' : '') + transcript;
        };
    }

    function toggleRecording() {
        if (!recognition) return alert('当前浏览器不支持原生语音识别，请使用 Chrome 或 Safari');
        const btn = document.getElementById('recordBtn');
        if (!isRecording) {
            isRecording = true;
            recognition.start();
            if (btn) { btn.innerText = '🛑 正在录音...（点击停止）'; btn.style.color = '#ff4d4f'; }
        } else {
            isRecording = false;
            recognition.stop();
            if (btn) { btn.innerText = '🎙️ 追加录音'; btn.style.color = 'var(--text-main)'; }
        }
    }

    // 📷 图片粘贴
    document.addEventListener('paste', (e) => {
        for (let item of e.clipboardData.items) {
            if (item.type.indexOf('image') !== -1) addImagePreview(item.getAsFile());
        }
    });

    function handleFileSelect(e) {
        for (let file of e.target.files) addImagePreview(file);
    }

    function addImagePreview(file) {
        imageFiles.push(file);
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.createElement('img');
            img.src = e.target.result;
            img.className = 'preview-img';
            document.getElementById('imgPreviewArea').appendChild(img);
        };
        reader.readAsDataURL(file);
    }

    // 🔮 DeepSeek 智能去噪提炼
    async function processWithDeepSeek(isRefining = false) {
        const apiKey = localStorage.getItem('bt_api_key');
        if (!apiKey) {
            toggleConfigBackdoor();
            return alert('请先点大闪电 ⚡ 填入 DeepSeek API Key！');
        }

        const rawText = document.getElementById('rawText').value.trim();
        const refinePrompt = document.getElementById('refinePrompt').value.trim();
        
        document.getElementById('confirmCard').style.display = 'block';
        document.getElementById('outSummary').value = '正在分析总结... 🔮';

        let userContent = `原始输入文本：\n${rawText || "用户已上传图片/截图"}`;
        if (isRefining) userContent += `\n\n【用户提出的修改要求】：${refinePrompt}`;

        const systemPrompt = `你是一个高级个人信息分类与提炼秘书。
【6种固定分类】：工作学习, 思维火花, 兴趣爱好, 工具技巧, 个人代办, 其它
严格输出 JSON 格式：{"title": "标题", "category": "分类名称", "summary": "精炼摘要"}`;

        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-v4-flash',
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userContent }
                    ],
                    response_format: { type: "json_object" }
                })
            });

            const data = await response.json();
            const resContent = JSON.parse(data.choices[0].message.content);

            document.getElementById('outTitle').value = resContent.title || '无标题速记';
            document.getElementById('outCategory').value = resContent.category || '其它';
            document.getElementById('outSummary').value = resContent.summary || '';
        } catch (err) {
            document.getElementById('outSummary').value = '提炼异常：' + err.message;
        }
    }

    // 🚀 一键无感写入 Notion 数据库
    async function syncToNotion() {
        const secret = localStorage.getItem('notion_secret_key');
        let dbId = localStorage.getItem('notion_db_id') || '';
        
        // 自动容错：如果保存的 ID 含有开头斜杠，这里也自动去斜杠
        dbId = dbId.replace(/^\//, '').trim();

        if (!secret || !dbId) {
            toggleConfigBackdoor();
            return alert('请先点大闪电 ⚡ 填入 Notion Secret 和 Database ID！');
        }

        const title = document.getElementById('outTitle').value.trim();
        const category = document.getElementById('outCategory').value;
        const summary = document.getElementById('outSummary').value.trim();
        const rawText = document.getElementById('rawText').value.trim();

        if (!title || !summary) return alert('标题和摘要不能为空！');

        saveToHistory(title, category, summary);

        const syncBtn = document.getElementById('syncBtn');
        syncBtn.innerText = "⏳ 正在写入 Notion...";
        syncBtn.disabled = true;

        const targetUrl = "https://yellow-thunder-60be.kakei-chiu.workers.dev/";

        const payload = {
            "parent": { "database_id": dbId },
            "properties": {
                "碎片标题": { "title": [{ "text": { "content": title } }] },
                "分类": { "select": { "name": category } },
                "碎片内容": { "rich_text": [{ "text": { "content": summary } }] },
                "备注": { "rich_text": [{ "text": { "content": rawText ? `原始记录：${rawText.slice(0, 200)}` : "速记" } }] },
                "日期": { "date": { "start": new Date().toISOString() } }
            }
        };

        try {
            const response = await fetch(targetUrl, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${secret}`,
                    "Notion-Version": "2025-09-03",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const resData = await response.json();

            if (response.ok && resData.object === 'page') {
                alert('🎉 写入成功！数据已实时同步至 Notion！');
            } else {
                alert(`Notion 报错：${resData.message || JSON.stringify(resData)}`);
            }
        } catch (err) {
            console.error(err);
            alert('请求失败：' + err.message);
        } finally {
            syncBtn.innerText = "🚀 确认并写入 Notion";
            syncBtn.disabled = false;
        }
    }

    function saveToHistory(title, category, summary) {
        let history = JSON.parse(localStorage.getItem('feishu_history')) || [];
        history.unshift({ title, category, summary, time: new Date().toLocaleString() });
        if (history.length > 10) history = history.slice(0, 10);
        localStorage.setItem('feishu_history', JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('feishu_history')) || [];
        const historyCard = document.getElementById('historyCard');
        const historyList = document.getElementById('historyList');

        if (!historyCard || !historyList) return;
        if (history.length === 0) return historyCard.style.display = 'none';

        historyCard.style.display = 'block';
        historyList.innerHTML = history.map(item => `
            <div class="history-item">
                <div style="color: var(--accent-glow); font-weight: bold;">[${escapeHtml(item.category)}] ${escapeHtml(item.title)} <span style="font-size:10px; color:var(--text-muted); font-weight:normal;">(${item.time})</span></div>
                <div style="color: var(--text-main); margin-top: 4px;">${escapeHtml(item.summary)}</div>
            </div>
        `).join('');
    }

    function escapeHtml(text) {
        return text ? text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : '';
    }
</script>
</body>
</html>
