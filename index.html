<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ JACKIE的思维火花记录 // 今天又在想什么呢?</title>
    
    <!-- CSS 样式区域：定义页面的视觉外观 -->
    <style>
        /* 1. 全局变量定义：统一配置暗黑模式主题颜色，方便后续一键换肤 */
        :root {
            --bg-color: #0d1117;       /* 页面总背景色 (深暗色) */
            --card-bg: #161b22;         /* 卡片背景色 */
            --border-color: #30363d;     /* 边框线条颜色 */
            --accent-glow: #00ffaa;     /* 主主题色：高亮发光绿 */
            --accent-blue: #2f81f7;     /* 辅助色：极客蓝 */
            --text-main: #e6edf3;       /* 主文字颜色 */
            --text-muted: #8b949e;      /* 次要/提示文字颜色 */
            --radius: 12px;             /* 卡片统一圆角大小 */
        }

        /* 2. 基础重置：消除不同浏览器的默认边距差异 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 3. 布局容器：限定页面最大宽度，保证在超大屏和手机上都能居中好看 */
        .container { width: 100%; max-width: 760px; flex: 1; }
        
        /* 卡片基础外观 */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        h2 { 
            color: var(--accent-glow); 
            font-size: 22px; 
            margin-bottom: 16px; 
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h3 { color: var(--accent-glow); font-size: 16px; margin-bottom: 14px; }
        
        /* 点击闪电 ⚡ 后门的交互效果 */
        .cyber-logo {
            font-size: 30px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s ease, filter 0.2s ease;
            display: inline-block;
        }
        .cyber-logo:hover {
            transform: scale(1.15);
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        /* 隐藏的密钥配置面板样式 */
        #configCard {
            display: none; /* 默认隐藏，点击闪电图标后用 JS 展开 */
            border: 1px dashed var(--accent-glow);
            background: rgba(22, 27, 34, 0.98);
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 表单控件（输入框、下拉框、文本域）外观 */
        label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 6px; margin-top: 10px; }
        textarea, input, select {
            width: 100%;
            background: rgba(9, 12, 16, 0.8);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus, input:focus, select:focus { border-color: var(--accent-glow); }

        /* 按钮与交互面板 */
        .btn-group { display: flex; gap: 12px; margin-bottom: 12px; }
        button {
            background: #238636;
            color: #fff;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        button:hover { background: #2ea043; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button.secondary { background: #21262d; border: 1px solid var(--border-color); color: var(--text-main); }
        button.secondary:hover { background: #30363d; border-color: #8b949e; }
        button.action-btn { font-size: 16px; padding: 14px; width: 100%; margin-top: 6px; }

        /* AI 对话微调框 */
        .refine-box {
            background: rgba(0, 0, 0, 0.25);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 14px;
            margin-top: 14px;
            margin-bottom: 14px;
        }
        .refine-row { display: flex; gap: 10px; align-items: center; }
        .refine-row input { margin-bottom: 0; flex: 1; }
        .refine-row button { white-space: nowrap; padding: 12px 16px; }

        /* 历史记录展开/折叠面板 */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .history-header:hover h3 { color: #fff; }
        .history-list { margin-top: 12px; display: none; }
        
        .history-item {
            background: rgba(9, 12, 16, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .history-content { flex: 1; min-width: 0; }
        .history-title { font-size: 14px; font-weight: bold; color: var(--accent-glow); margin-bottom: 4px; }
        .history-desc { font-size: 13px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .history-actions button { padding: 6px 10px; font-size: 12px; font-weight: normal; }

        footer {
            margin-top: 20px;
            padding: 16px 0;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            border-top: 1px solid rgba(48, 54, 61, 0.5);
            width: 100%;
            max-width: 760px;
        }

        /* 响应式适配：移动端（手机屏幕）自适应调整 */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .card { padding: 14px; }
            .btn-group button { width: 100%; padding: 14px 10px; }
            .refine-row { flex-direction: column; }
            .refine-row button { width: 100%; }
            .history-item { flex-direction: column; items: flex-start; }
            .history-actions { width: 100%; justify-content: flex-end; margin-top: 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 页头标题栏 -->
    <h2>
        <span class="cyber-logo" onclick="toggleConfigBackdoor()" title="点击开启/隐藏 API 配置面板">⚡</span> 
        赛博速记终端 
        <span style="font-size: 12px; color: var(--text-muted); font-weight: normal;">// Notion 自动化</span>
    </h2>

    <!-- [隐藏卡片]：API Key 密钥配置面板 -->
    <div class="card" id="configCard">
        <h3>🔒 密钥与数据库配置</h3>
        <label>DEEPSEEK API KEY</label>
        <input type="password" id="apiKey" placeholder="sk-xxx">
        
        <label>NOTION API KEY</label>
        <input type="password" id="notionSecret" placeholder="secret_xxxxxxxx...">
        
        <label>NOTION DATABASE ID</label>
        <input type="text" id="notionDbId" placeholder="例：a1b2c3d4e5f67890123456789abcdef0">

        <button onclick="saveConfig()" style="width: 100%; margin-top: 10px;">💾 保存配置并隐藏面板</button>
    </div>

    <!-- [模块 1]：内容采集区（已纯化为 文本输入 + 语音转文字） -->
    <div class="card">
        <h3>1. 采集内容</h3>
        <!-- 文本输入框：用户直接打字，或语音识别的文字自动追加到这里 -->
        <textarea id="rawText" rows="5" placeholder="在此输入内容，或点击下方开始发语音..."></textarea>
        
        <div class="btn-group">
            <!-- 语音录音控制按钮 -->
            <button class="secondary" id="recordBtn" onclick="toggleRecording()">🎙️ 按下开始录音</button>
        </div>

        <!-- 触发 AI 提炼的主按钮 -->
        <button class="action-btn" onclick="processWithDeepSeek()">🔮 AI 智能提炼</button>
    </div>

    <!-- [模块 2]：AI 提炼结果展示与微调确认区 -->
    <div class="card" id="confirmCard" style="display: none;">
        <h3>2. 确认与微调</h3>
        
        <label>碎片标题：</label>
        <input type="text" id="outTitle">
        
        <label>分类：</label>
        <select id="outCategory">
            <option value="工作学习">💼 工作学习</option>
            <option value="思维火花">💡 思维火花</option>
            <option value="兴趣爱好">🎸 兴趣爱好</option>
            <option value="工具技巧">🛠️ 工具技巧</option>
            <option value="个人代办">📅 个人代办</option>
            <option value="其它">📦 其它</option>
        </select>

        <label>碎片内容（摘要）：</label>
        <textarea id="outSummary" rows="4"></textarea>

        <!-- AI 对话微调区域：如果不满意提取结果，输入修正提示再发给 AI -->
        <div class="refine-box">
            <label style="margin-top: 0; color: var(--accent-glow);">💬 不满意？提出微调要求：</label>
            <div class="refine-row">
                <input type="text" id="refinePrompt" placeholder="例如：重点突出项目时间节点 / 请缩短到 50 字以内">
                <button class="secondary" onclick="processWithDeepSeek(true)">🔄 重新提炼</button>
            </div>
        </div>

        <!-- 确认无误，同步至 Notion 数据库 -->
        <button id="syncBtn" class="action-btn" onclick="syncToNotion()" style="background: var(--accent-blue);">🚀 确认并写入 Notion</button>
    </div>

    <!-- [模块 3]：本地历史记录（保存在浏览器本地，方便追溯和补发） -->
    <div class="card" id="historyCard" style="display: none;">
        <div class="history-header" onclick="toggleHistory()">
            <h3 style="margin-bottom: 0;">🕒 最近 10 条火花记录</h3>
            <span id="historyFoldIcon" style="color: var(--text-muted); font-size: 14px;">▶ 点击展开</span>
        </div>
        <div id="historyList" class="history-list"></div>
    </div>
</div>

<footer>
    Designed & Developed with ⚡ by <strong>Jackie</strong>
</footer>

<!-- JavaScript 逻辑区域：核心功能实现 -->
<script>
    // =========================================================================
    // 1. 全局变量定义
    // =========================================================================
    let isRecording = false;    // 标记当前是否正在录音
    let recognition = null;     // 存储浏览器自带的语音识别实例 (Web Speech API)

    // =========================================================================
    // 2. 页面加载初始化 (DOM Ready)
    // =========================================================================
    window.addEventListener('DOMContentLoaded', () => {
        renderHistory(); // 渲染历史数据
        
        // 读取本地存储的 API Key，如果有的话自动填入隐藏面板
        const apiKey = localStorage.getItem('bt_api_key');
        const notionSecret = localStorage.getItem('notion_secret_key');
        const notionDbId = localStorage.getItem('notion_db_id');
        
        if (apiKey) document.getElementById('apiKey').value = apiKey;
        if (notionSecret) document.getElementById('notionSecret').value = notionSecret;
        if (notionDbId) document.getElementById('notionDbId').value = notionDbId;
    });

    // =========================================================================
    // 3. 密钥面板与本地配置管理
    // =========================================================================
    
    // 点击闪电 ⚡ 图标，显示或隐藏配置卡片
    function toggleConfigBackdoor() {
        const configCard = document.getElementById('configCard');
        if (configCard) {
            configCard.style.display = (configCard.style.display === 'block') ? 'none' : 'block';
        }
    }

    // 将用户填写的 API Key 保存到浏览器的 localStorage (本地缓存)
    function saveConfig() {
        const key = document.getElementById('apiKey').value.trim();
        const secret = document.getElementById('notionSecret').value.trim();
        let dbId = document.getElementById('notionDbId').value.trim();

        // 过滤清理 Database ID 里的斜杠路径
        dbId = dbId.replace(/^\//, '').trim();

        if (!key || !secret || !dbId) {
            return alert('请填入完整的 DeepSeek Key、Notion Secret 和 Database ID！');
        }

        localStorage.setItem('bt_api_key', key);
        localStorage.setItem('notion_secret_key', secret);
        localStorage.setItem('notion_db_id', dbId);

        document.getElementById('configCard').style.display = 'none';
        alert('✅ 配置保存成功！');
    }

    // =========================================================================
    // 4. 语音识别功能 (基于原生 Web Speech API)
    // =========================================================================
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true; // 开启连续识别
        recognition.lang = 'zh-CN';      // 识别语言设为中文

        // 实时获取听写文字并拼接写进文本框
        recognition.onresult = (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    transcript += event.results[i][0].transcript;
                }
            }
            const rawText = document.getElementById('rawText');
            if (rawText && transcript) {
                rawText.value += (rawText.value ? '\n' : '') + transcript;
            }
        };
    }

    // 切换录音开关（按下开始/停止）
    function toggleRecording() {
        if (!recognition) {
            return alert('当前浏览器暂不支持语音识别，推荐使用 Chrome 或 Safari 浏览器。');
        }
        
        const btn = document.getElementById('recordBtn');
        if (!isRecording) {
            isRecording = true;
            recognition.start(); // 开启麦克风监听
            if (btn) { 
                btn.innerText = '🛑 正在录音（点击停止）...'; 
                btn.style.color = '#ff4d4f'; 
            }
        } else {
            isRecording = false;
            recognition.stop();  // 关闭麦克风监听
            if (btn) { 
                btn.innerText = '🎙️ 按下开始录音'; 
                btn.style.color = 'var(--text-main)'; 
            }
        }
    }

    // =========================================================================
    // 5. 调用 DeepSeek 大模型进行智能分类与总结
    // =========================================================================
    async function processWithDeepSeek(isRefining = false) {
        const apiKey = localStorage.getItem('bt_api_key');
        if (!apiKey) {
            toggleConfigBackdoor();
            return alert('请先点击左上角⚡大闪电，填入你的 DeepSeek API Key！');
        }

        const rawText = document.getElementById('rawText').value.trim();
        const refinePrompt = document.getElementById('refinePrompt').value.trim();
        
        if (!rawText) {
            return alert('请先在文本框里输入文字或通过语音录入！');
        }

        // 显示第二步卡片，并在摘要框填充加载提示
        document.getElementById('confirmCard').style.display = 'block';
        document.getElementById('outSummary').value = 'AI 正在脑暴提炼中，请稍候... 🔮';

        // 构建发送给大模型的用户文本
        let userPrompt = `原始输入文本：\n${rawText}`;
        if (isRefining && refinePrompt) {
            userPrompt += `\n\n【用户修改指令】：${refinePrompt}`;
        }

        // System Prompt：给 AI 设置人设与输出规则（要求输出严格 JSON）
        const systemPrompt = `你是一个高级个人信息分类与提炼秘书。请分析用户输入的文本，生成结构化总结。
必须从以下【6种固定分类】中选择最贴切的一个：工作学习, 思维火花, 兴趣爱好, 工具技巧, 个人代办, 其它
请严格且仅输出以下 JSON 格式（不要包含 markdown 代码块）：
{"title": "精炼标题", "category": "分类名称", "summary": "结构化摘要要点"}`;

        try {
            // 向 DeepSeek 官方 API 发起 POST 请求
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat', // 使用 DeepSeek 标准纯文本模型，极速且经济
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userPrompt }
                    ],
                    response_format: { type: "json_object" } // 强制要求 API 返回 JSON
                })
            });

            const data = await response.json();
            
            // 防错检查：如果 API 报错，抛出异常
            if (!data.choices || !data.choices[0]) {
                throw new Error(data.error?.message || "API 未能正常响应");
            }

            // 解析大模型返回的 JSON 字符串
            const resContent = JSON.parse(data.choices[0].message.content);

            // 将 AI 提炼出的结果渲染到第二步的表单输入框中，供用户二次微调
            document.getElementById('outTitle').value = resContent.title || '无标题速记';
            document.getElementById('outCategory').value = resContent.category || '其它';
            document.getElementById('outSummary').value = resContent.summary || '';

        } catch (err) {
            console.error("DeepSeek 提炼失败：", err);
            document.getElementById('outSummary').value = '提炼异常：' + err.message;
        }
    }

    // =========================================================================
    // 6. 同步数据到 Notion 数据库 (通过 Cloudflare Worker 中转)
    // =========================================================================
    async function syncToNotion(customData = null) {
        const secret = localStorage.getItem('notion_secret_key');
        let dbId = localStorage.getItem('notion_db_id') || '';
        dbId = dbId.replace(/^\//, '').trim();

        if (!secret || !dbId) {
            toggleConfigBackdoor();
            return alert('请先点击左上角⚡闪电配置 Notion Secret 与 Database ID！');
        }

        // 提取要同步的数据（如果是点击历史记录直接写入，就用 customData，否则用当前表单数据）
        const title = customData ? customData.title : document.getElementById('outTitle').value.trim();
        const category = customData ? customData.category : document.getElementById('outCategory').value;
        const summary = customData ? customData.summary : document.getElementById('outSummary').value.trim();
        const rawText = customData ? customData.rawText : document.getElementById('rawText').value.trim();

        if (!title || !summary) return alert('标题和摘要不能为空！');

        // 保存本次记录到本地历史列表
        if (!customData) saveToHistory(title, category, summary, rawText);

        const syncBtn = document.getElementById('syncBtn');
        syncBtn.innerText = "⏳ 正在写入 Notion...";
        syncBtn.disabled = true;

        // Cloudflare Worker 反向代理地址（解决前端跨域限制）
        const targetUrl = "https://yellow-thunder-60be.kakei-chiu.workers.dev/";

        // 构造 Notion 规定的数据结构 Payload
        const payload = {
            "parent": { "database_id": dbId },
            "properties": {
                "碎片标题": { "title": [{ "text": { "content": title } }] },
                "分类": { "select": { "name": category } },
                "碎片内容": { "rich_text": [{ "text": { "content": summary } }] },
                "备注": { "rich_text": [{ "text": { "content": rawText ? `原始文本：${rawText.slice(0, 200)}` : "速记" } }] },
                "日期": { "date": { "start": new Date().toISOString() } }
            }
        };

        try {
            const response = await fetch(targetUrl, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${secret}`,
                    "Notion-Version": "2025-09-03",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const resData = await response.json();

            if (response.ok && resData.object === 'page') {
                alert('🎉 成功写入 Notion 数据库！');
            } else {
                alert(`Notion 写入失败：${resData.message || JSON.stringify(resData)}`);
            }
        } catch (err) {
            console.error(err);
            alert('请求失败：' + err.message);
        } finally {
            syncBtn.innerText = "🚀 确认并写入 Notion";
            syncBtn.disabled = false;
        }
    }

    // =========================================================================
    // 7. 本地历史记录管理 (基于 localStorage)
    // =========================================================================
    
    // 展开/折叠历史记录面板
    function toggleHistory() {
        const list = document.getElementById('historyList');
        const icon = document.getElementById('historyFoldIcon');
        if (list.style.display === 'block') {
            list.style.display = 'none';
            icon.innerText = '▶ 点击展开';
        } else {
            list.style.display = 'block';
            icon.innerText = '▼ 点击折叠';
        }
    }

    // 保持最多最近 10 条记录在本地
    function saveToHistory(title, category, summary, rawText) {
        let history = JSON.parse(localStorage.getItem('feishu_history')) || [];
        history.unshift({ title, category, summary, rawText, time: new Date().toLocaleString() });
        if (history.length > 10) history = history.slice(0, 10);
        localStorage.setItem('feishu_history', JSON.stringify(history));
        renderHistory();
    }

    // 将历史数据生成 HTML 展示在前端
    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('feishu_history')) || [];
        const historyCard = document.getElementById('historyCard');
        const historyList = document.getElementById('historyList');

        if (!historyCard || !historyList) return;
        if (history.length === 0) return historyCard.style.display = 'none';

        historyCard.style.display = 'block';
        historyList.innerHTML = history.map((item, index) => `
            <div class="history-item">
                <div class="history-content">
                    <div class="history-title">[${escapeHtml(item.category)}] ${escapeHtml(item.title)}</div>
                    <div class="history-desc">${escapeHtml(item.summary)}</div>
                </div>
                <div class="history-actions">
                    <button class="secondary" onclick="editHistoryItem(${index})">✏️ 编辑</button>
                    <button style="background:#0052d9;" onclick="syncToNotion(getHistoryItem(${index}))">🚀 写入</button>
                </div>
            </div>
        `).join('');
    }

    function getHistoryItem(index) {
        const history = JSON.parse(localStorage.getItem('feishu_history')) || [];
        return history[index];
    }

    // 从历史记录重新载入到编辑框
    function editHistoryItem(index) {
        const item = getHistoryItem(index);
        if (!item) return;
        
        document.getElementById('confirmCard').style.display = 'block';
        document.getElementById('outTitle').value = item.title;
        document.getElementById('outCategory').value = item.category;
        document.getElementById('outSummary').value = item.summary;
        if (item.rawText) document.getElementById('rawText').value = item.rawText;
        
        window.scrollTo({ top: document.getElementById('confirmCard').offsetTop - 20, behavior: 'smooth' });
    }

    // 转义 HTML 字符，防止简单的脚本注入安全隐患
    function escapeHtml(text) {
        return text ? text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : '';
    }
</script>
</body>
</html>
